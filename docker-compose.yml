services:
  app:
    image: cargoaim-frontend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cargoaim-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app 
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped